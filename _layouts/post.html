---
layout: default
---

<section class="intro">

  <div class="wrap">

    <h1>
      {{ page.title }}
    </h1>
    <p>
      <i>
        {{ page.description }}
      </i>
      - {{ page.date | date_to_long_string }}
    </p>
    <br>
    {% include image.html src=page.image %}

  </div>

</section>

<section class="single">

  {{ page.content }}

</section>
