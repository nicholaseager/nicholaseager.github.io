---
layout: default
---

<section class="section__banner">
	{% include banner.html image=page.image title=page.title %}
</section>

<section id="content" class="single">
	<blockquote>{{ page.description }}</blockquote>
    {% if page.tags %}
	{% include gallery.html
		orderable=true
		tags=page.tags
	%}
	{% endif %}
	{{ page.content }}
</section>
