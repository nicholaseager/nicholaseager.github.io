---
layout: default
title: Photographer
description: SEO Description
featured_image: /images/social.jpg
---

<section class="listing">

	<div class="content-wrap listing-wrap">

		{% for place in site.places reversed %}

		<div class="listing-item">

			<a class="listing-item__link" href="{{ place.url | relative_url }}">

				<div class="listing-item__image">
					<img src="{{ place.featured_image | relative_url }}" alt="{{ place.title }}">
				</div>

				<div class="listing-item__content listing-item__content--{{ site.data.settings.grid_settings.content_alignment }}">
					<div class="listing-item__info">
						<h2 class="listing-item__title">{{ place.title }}</h2>
						<p class="listing-item__subtitle">{{ place.subtitle }}</p>
					</div>
				</div>

			</a>

		</div>

		{% endfor %}

	</div>

</section>
