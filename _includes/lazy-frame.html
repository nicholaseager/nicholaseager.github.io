<iframe
  width="{{include.width | default=640}}" height="{{include.height | default=320}}"
  id="lazyframe {{ include.id }}"
  srcdoc="<style>*{padding:0;margin:0;overflow:hidden}html,body{background:{{include.background-color}};height:100%}img{position:absolute;width:100%;top:0;bottom:0;margin:auto}</style>
  <a href='{{include.link}}'>
    {%- if include.placeholder -%}
    <img src='{{include.placeholder}}'>
    {%- endif -%}
    <img id='loadbutton' src='{{include.loadbutton-src}}' style='width: 66px; position: absolute; left: 43.5%;'></a>"
  frameborder="0"
  data-src="{{include.link}}"
  allowfullscreen
  scrolling="no" 
  loading="lazy"
  style="background-color: {{include.background-color | default=#000}}" 
></iframe>
