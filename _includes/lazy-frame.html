{%- capture srcdoc -%}
<style>
    * {
        padding: 0;
        margin: 0;
        overflow: hidden
    }

    html,
    body {
        background: {{include.background-color}};
        height:100%;
    }

    img {
        position: absolute;
        width: 100%;
        top: 0;
        bottom: 0;
        margin: auto
    }

    a {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        bottom: 0;
        margin: auto;
    }

    .loadbutton {
        position: absolute;
        width: 64px;
        height: 64px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    svg {
        width: 100%;
        height: 100%;
    }
</style>
<a href='{{include.link}}'>
    {%- if include.placeholder -%}
    <img src='{{include.placeholder}}'>
    {%- endif -%}
    <div class='loadbutton'>
        <img src='{{include.loadbutton-src}}'>
    </div>
</a>
{%- endcapture -%}
{%- assign srcdoc = srcdoc | strip_newlines | normalize_whitespace -%}

<iframe
  width="{{include.width | default=640}}" height="{{include.height | default=320}}"
  id="lazyframe {{ include.id }}"
  srcdoc="{{srcdoc}}"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  data-src="{{include.link}}"
  allowfullscreen
  scrolling="no" 
  loading="lazy"
  style="background-color: {{include.background-color | default=#000}}" 
></iframe>
