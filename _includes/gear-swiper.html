{% assign trip = include.trip %}
{% assign gears = site.data.gear | where_exp:"gear", "gear.trips contains trip" %}

<div class="outside-swiper-wrap">
    <div class="swiper grid-swiper">
        <div class="swiper-wrapper">
            {% for gear in gears %}
            <div class="swiper-slide gear-item">
                <img src="{{ gear.img }}" alt="{{ gear.title }}" />
                <div class="title">{{ gear.title }}</div>
                <a href="{{ gear.url }}" class="button button--small button--rounded button--expanded">
                    View
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="swiper-pagination swiper-pagination-outside"></div>
    <div class="swiper-button-prev swiper-button-prev-outside"></div>
    <div class="swiper-button-next swiper-button-next-outside"></div>
</div>
