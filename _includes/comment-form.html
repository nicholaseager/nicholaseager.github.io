<div class="eager-form">

  <form
    method="post"
    action="https://formspree.io/f/xlekgaoj"
    id="comment-form">

    <div class="eager-form__item">
      <label class="eager-form__label">Email Address *
      </label>
      <input
        type="text"
        name="email"
        placeholder="Your email address..."
        class="eager-form__input">
    </div>

    <div class="eager-form__item">
      <label class="eager-form__label">Name *
      </label>
      <input
        type="text"
        name="name"
        placeholder="Your name..."
        class="eager-form__input">
    </div>

    <div class="eager-form__item">
      <label class="eager-form__label">Comment *
      </label>
      <textarea
        name="message"
        placeholder="Your comment..."
        class="eager-form__textarea"></textarea>
    </div>

    <input
      type="hidden"
      name="_next"
      value="/thanks" />
    <input
      type="hidden"
      name="_subject"
      value="Comment" />
    <input
      type="hidden"
      name="_page"
      value="{{ include.url }}" />
    <input
      type="text"
      name="_gotcha"
      style="display: none;"
      class="eager-form__gotcha"
      val="">

    <div class="eager-form__item">
      <input
        type="submit"
        value="Send Comment"
        class="button button--large">
    </div>

  </form>

</div>
