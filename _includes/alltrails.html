{%- capture link -%}https://www.alltrails.com/widget/recording/{{ include.id }}?scrollZoom=false&elevationDiagram=false&u=m{%- endcapture -%}
<p>Below is a map of the entire route. To see it in full-screen, click <a href="https://www.alltrails.com/explore/recording/{{ include.id }}" target="_blank">here</a>.</p>
<iframe
    id="lazyframe alltrails {{ include.id }}"
    srcdoc="<style>*{padding:0;margin:0;overflow:hidden}html,body{background:rgb(190,208,170);height:100%}</style>
    <a href='{{link}}'>
    <i id='loadbutton' class='fas fa-compass'></i></a>"
    data-src="{{link}}"
    width="500" height="400"
    frameborder="0"
    scrolling="no"
    marginheight="0"
    marginwidth="0"
    loading="lazy"
    style="background-color: rgb(190,208,170)" 
></iframe>
