<div class="swiper swiperCollection swiper-initialized swiper-horizontal swiper-pointer-events swiper-backface-hidden">
    <div class="swiper-wrapper">
        <!-- Slides -->
        {% for post in include.items limit:include.limit %}
        <div class="swiper-slide">
            <article class="collection-item">

                <a href="{{ post.url | relative_url }}">

                    <div class="collection-item-image">
                        {% assign post_image = post.image | relative_url %}
                        {% include gallery-image.html src=post_image alt=post.title %}
                    </div>

                    <div class="collection-item-content">
                        <div>
                            <div class="collection-item-title">{{ post.title }}</div>
                            <div class="collection-item-subtitle">{{ post.description }}</div>
                        </div>
                    </div>

                </a>

            </article>
        </div>
        {% endfor %}
    </div>
</div>
