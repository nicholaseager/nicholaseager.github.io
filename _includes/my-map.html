<style>
    .map-wrapper {
        position: relative;
    }
    .map-overlay {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
</style>
<div class="map-wrapper">
    <iframe
        id="lazyframe googlemap {{ include.id }}"
        srcdoc="<style>*{padding:0;margin:0;overflow:hidden}html,body{background:rgb(146,180,243);height:100%}</style>
        <a href='https://www.google.com/maps/d/u/0/embed?mid={{ include.id }}'>
        <i id='loadbutton' class='fas fa-compass'></i></a>"
        width="640" height="480"
        frameborder="0"
        scrolling="no"
        marginheight="0"
        marginwidth="0"
        loading="lazy"
        style="background-color: rgb(146,180,243);margin-top: 10px;" 
    ></iframe>
    <div class="map-overlay" onclick="style.pointerEvents='none'"></div>
</div>
