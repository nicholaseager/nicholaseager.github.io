{%- capture link -%}https://www.google.com/maps/d/u/0/embed?mid={{ include.id }}{%- endcapture -%}
<style>
    .map-wrapper {
        position: relative;
        margin-top: 20px;
        margin-bottom: 20px;
    }
    .map-overlay {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
</style>
<div class="map-wrapper">
    <p>Below is a map with points of interest. To see it in full-screen, click <a href="https://www.google.com/maps/d/viewer?mid={{ include.id }}" target="_blank">here</a>.</p>
    <iframe
        id="lazyframe googlemap {{ include.id }}"
        srcdoc="<style>*{padding:0;margin:0;overflow:hidden}html,body{background:rgb(146,180,243);height:100%}</style>
        <a href='{{link}}'>
        <i id='loadbutton' class='fas fa-compass'></i></a>"
        data-src="{{link}}"
        width="640" height="480"
        frameborder="0"
        scrolling="no"
        marginheight="0"
        marginwidth="0"
        loading="lazy"
        style="background-color: rgb(146,180,243);" 
    ></iframe>
    <div class="map-overlay" onclick="style.pointerEvents='none'"></div>
</div>
