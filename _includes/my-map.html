<style>
    .overlay {
        background: transparent;
        position: relative;
        width: 640px;
        height: 480px;
        /* your iframe height */
        top: 480px;
        /* your iframe height */
        margin-top: -480px;
        /* your iframe height */
    }
</style>
<div class="overlay" onClick="style.pointerEvents='none'"></div>
<iframe
    id="lazyframe googlemap {{ include.id }}"
    srcdoc="<style>*{padding:0;margin:0;overflow:hidden}html,body{background:rgb(146,180,243);height:100%}</style>
    <a href='https://www.google.com/maps/d/u/0/embed?mid={{ include.id }}'>
    <i id='loadbutton' class='fas fa-compass'></i></a>"
    width="640" height="480"
    frameborder="0"
    scrolling="no"
    marginheight="0"
    marginwidth="0"
    loading="lazy"
    style="background-color: rgb(146,180,243)" 
></iframe>
