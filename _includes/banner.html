<div class="banner">
    <div class="banner__background">
        {% include image.html src=include.image %}
    </div>
    <div class="banner__background__shading"></div>
</div>

<div class="banner__content__background">
    <div class="banner__content">
        <h1 class="banner__title">{{ include.title }}</h1>
        <p class="banner__description">{{ include.subtitle }}</p>
    </div>
</div>
