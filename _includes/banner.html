<div class="banner">
    <div class="banner__background">
        {% include image.html src=include.image %}
    </div>
    <div class="banner__container">
        <div class="banner__background__shading"></div>
        <div class="banner__container__content">
            <h2 class="title">{{ include.title }}</h2>
            <a href="#content">
                <i class="button-scroll fas fa-chevron-down" aria-hidden="true"></i>
            </a>
        </div>
    </div>
</div>
