---
layout: default
title: Themes
featured_image: /images/social.jpg
---

<section class="listing">

	<div class="content-wrap listing-wrap">

		{% for theme in site.themes reversed %}

		<div class="listing-item">

			<a class="listing-item__link" href="{{ theme.url | relative_url }}">

				<div class="listing-item__image">
					<img src="{{ theme.featured_image | relative_url }}" alt="{{ project.title }}">
				</div>

				<div class="listing-item__content listing-item__content--{{ site.data.settings.grid_settings.content_alignment }}">
					<div class="listing-item__info">
						<h2 class="listing-item__title">{{ theme.title }}</h2>
						<p class="listing-item__subtitle">{{ theme.subtitle }}</p>
					</div>
				</div>

			</a>

		</div>

		{% endfor %}

	</div>

</section>
