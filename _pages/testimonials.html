---
layout: page
title: Testimonials
sitemap: false
---

{% for testimonial in site.data.testimonials %}
  <blockquote class="testimonial">
    {{ testimonial.quote }}
    <span>
      {{ testimonial.author }}
    </span>
    {% if testimonial.url %}
      <a href="{{ testimonial.url }}" target="_blank">Source
      </a>
    {% endif %}
  </blockquote>
{% endfor %}
