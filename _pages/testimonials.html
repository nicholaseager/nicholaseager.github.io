---
layout: page
title: Testimonials
---

{% for testimonial in site.data.testimonials %}
<blockquote class="testimonial">
    {{ testimonial.quote }}
    <span>{{ testimonial.author }}</span>
    {% if testimonial.url %}
    <a href="{{ testimonial.url }}" target="_blank">More</a>
    {% endif %}
</blockquote>
{% endfor %}
